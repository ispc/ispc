name: Reusable ISPC build workflow

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform to build on (linux, macos, windows)'
        required: true
        type: string
      architecture:
        description: 'Architecture to build for (x86, aarch64)'
        required: true
        type: string
        default: 'x86'
      artifact_name:
         description: 'Name for build artifact'
         required: true
         type: string
      runner:
         description: 'Github runner (ubuntu-22.04, ubuntu-22.04-arm, macos-13, windows-2019)'
         required: true
         type: string
      llvm_version:
        description: 'LLVM version to use'
        required: true
        type: string
      llvm_tar:
        description: 'LLVM tarball filename'
        required: true
        type: string
      enable_cross:
        description: 'Build with cross compilation support'
        required: false
        type: boolean
        default: false
      enable_lto:
        description: 'Enable Link Time Optimization'
        required: false
        type: boolean
        default: false
      enable_xe:
        description: 'Enable XE dependencies'
        required: false
        type: boolean
        default: false
      enable_wasm:
        description: 'Enable WebAssembly support'
        required: false
        type: boolean
        default: false


env:
  SDE_MIRROR_ID: 843185
  SDE_TAR_NAME: sde-external-9.48.0-2024-11-25
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/94.0.4606.81 Safari/537.36"
  LLVM_VERSION: ${{ inputs.llvm_version }}
  LLVM_TAR: ${{ inputs.llvm_tar }}
  LLVM_REPO: https://github.com/ispc/ispc.dependencies
  BUILD_TYPE: "Release"
  INSTALL_COMPUTE_RUNTIME: ${{ inputs.enable_xe == true && '1' || '' }}
  COMPUTE_RUNTIME_GITHUB_RELEASE: ${{ inputs.enable_xe == true && '1' || '' }}
  ISPC_ANDROID_NDK_PATH: "/usr/local/share/android-ndk"

jobs:
  build-ispc:
    name: Build ISPC on ${{ inputs.platform }}
    runs-on: ${{ inputs.runner }}

    env:
      LLVM_HOME: ${{ inputs.platform == 'windows' && 'C:\\projects\\llvm' || github.workspace }}
      CROSS_TOOLS_GNUWIN32: ${{ inputs.platform == 'windows' && 'C:\\projects\\cross\\gnuwin32' || '' }}

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      with:
        submodules: true

    # Platform-specific setup
    - name: Add msbuild to PATH
      if: inputs.platform == 'windows'
      uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

    - name: Install dependencies for Windows
      if: inputs.platform == 'windows'
      run: |
        .github/workflows/scripts/install-build-deps.ps1

    - name: Install dependencies for Linux
      if: inputs.platform == 'linux'
      run: |
        .github/workflows/scripts/install-build-deps.sh

    - name: Install dependencies for macOS
      if: inputs.platform == 'macos'
      run: |
        ls -al /Library/Developer/CommandLineTools/SDKs/
        xcrun --show-sdk-path
        [ -n "$LLVM_REPO" ] && wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 5 --no-verbose "$LLVM_REPO/releases/download/llvm-${LLVM_VERSION}-ispc-dev/${LLVM_TAR}"
        tar xf "$LLVM_TAR"
        echo "${GITHUB_WORKSPACE}/bin-${LLVM_VERSION}/bin" >> "$GITHUB_PATH"
        brew install bison flex ninja
        if [ "${{ inputs.runner }}" == "macos-14" ]; then
          echo "/opt/homebrew/opt/bison/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/flex/bin" >> "$GITHUB_PATH"
        else
          echo "/usr/local/opt/bison/bin" >> "$GITHUB_PATH"
          echo "/usr/local/opt/flex/bin" >> "$GITHUB_PATH"
        fi

    - name: Check environment
      run: |
        if [ "${{ inputs.platform }}" == "linux" ]; then
          which -a clang
          cat /proc/cpuinfo
        elif [ "${{ inputs.platform }}" == "macos" ]; then
          which -a clang
          llvm-config --system-libs
          sysctl -n machdep.cpu.brand_string
        else
          wmic cpu get caption, deviceid, name, numberofcores, maxclockspeed, status
        fi
      shell: bash

    # Build commands based on platform and options
    - name: Build on Linux/macOS (no LTO, no Xe)
      if: (inputs.platform == 'linux' || inputs.platform == 'macos') && !inputs.enable_lto && !inputs.enable_xe && !inputs.enable_cross
      run: |
        .github/workflows/scripts/build-ispc.sh

    - name: Build release on Linux (no LTO, no Xe, Cross ON)
      if: (inputs.platform == 'linux' || inputs.platform == 'macos') && !inputs.enable_lto && !inputs.enable_xe && inputs.enable_cross
      run: |
        .github/workflows/scripts/build-ispc.sh -DISPC_CROSS=ON

    - name: Build on Linux (with LTO, no Xe)
      if: inputs.platform == 'linux' && inputs.enable_lto && !inputs.enable_xe
      run: |
        cmake superbuild \
          -B build \
          --preset os \
          -DLTO=ON \
          -DXE_DEPS=OFF \
          -DCMAKE_CXX_FLAGS=-Werror \
          -DPREBUILT_STAGE2_PATH="${GITHUB_WORKSPACE}/bin-${LLVM_VERSION}"
        cmake --build build

    - name: Build on macOS (with LTO, no Xe)
      if: inputs.platform == 'macos' && inputs.enable_lto && !inputs.enable_xe
      run: |
        cmake superbuild \
          -B build \
          --preset os \
          -DLTO=ON \
          -DXE_DEPS=OFF \
          -DCMAKE_CXX_FLAGS=-Werror \
          -DPREBUILT_STAGE2_PATH="${GITHUB_WORKSPACE}/bin-${LLVM_VERSION}" \
          -DMACOS_UNIVERSAL_BIN=ON \
          -DISPC_ANDROID_NDK_PATH=${{ env.ISPC_ANDROID_NDK_PATH }}
        cmake --build build

    - name: Build on Linux (no LTO, with XE)
      if: (inputs.platform == 'linux') && !inputs.enable_lto && inputs.enable_xe
      run: |
        cmake superbuild \
            -B build \
            --preset os \
            -DISPC_CROSS=ON \
            -DINSTALL_WITH_XE_DEPS=ON \
            -DISPC_INCLUDE_BENCHMARKS=ON \
            -DPREBUILT_STAGE2_PATH="${GITHUB_WORKSPACE}/bin-${LLVM_VERSION}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}"/ispc-xe
        cmake --build build

    - name: Build on Linux (no LTO, no XE, with WASM)
      if: (inputs.platform == 'linux') && !inputs.enable_lto && !inputs.enable_xe && inputs.enable_wasm
      run: |
        # Setup emcc for WASM target
        source scripts/install_emscripten.sh && emcc --version
        cmake ./ \
            -B build \
            -DISPC_PREPARE_PACKAGE=ON \
            -DISPC_CROSS=ON \
            -DWASM_ENABLED=ON \
            -DISPC_INCLUDE_BENCHMARKS=ON
        cd build && make package -j"$(nproc)"

    - name: Build on Windows (no LTO, no Xe)
      if: inputs.platform == 'windows' && !inputs.enable_lto && !inputs.enable_xe && !inputs.enable_wasm
      run: |
        .github/workflows/scripts/build-ispc.ps1

    - name: Build on Windows (with LTO, no Xe)
      if: inputs.platform == 'windows' && inputs.enable_lto && !inputs.enable_xe && !inputs.enable_wasm
      shell: cmd
      run: |
        set VSVARS="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        call %VSVARS%
        cmake -B build superbuild --preset os -G "NMake Makefiles" -DLTO=ON -DXE_DEPS=OFF -DPREBUILT_STAGE2_PATH=%LLVM_HOME%\bin-%LLVM_VERSION% -DEXPLICIT_ENV_PATH=OFF -DGNUWIN32=%CROSS_TOOLS_GNUWIN32%
        cmake --build build

    - name: Build on Windows (no LTO, with XE)
      if: inputs.platform == 'windows' && inputs.enable_xe && !inputs.enable_lto && !inputs.enable_wasm
      env:
        ISPC_DIR: "build\\build-ispc-stage2\\src\\ispc-stage2-build"
      shell: cmd
      run: |
        set VSVARS="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        call %VSVARS%
        cmake superbuild -B build --preset os -G "NMake Makefiles" -DINSTALL_WITH_XE_DEPS=ON -DPREBUILT_STAGE2_PATH=%LLVM_HOME%/bin-%LLVM_VERSION% -DCMAKE_INSTALL_PREFIX=%GITHUB_WORKSPACE%\ispc-xe -DISPC_INCLUDE_BENCHMARKS=ON -DEXPLICIT_ENV_PATH=OFF -DGNUWIN32=%CROSS_TOOLS_GNUWIN32% -DISPC_CROSS=ON
        cmake --build build

    - name: Build on Windows (no LTO, no XE, with WASM)
      if: (inputs.platform == 'windows') && !inputs.enable_lto && !inputs.enable_xe && inputs.enable_wasm
      run: |
        call scripts\install_emscripten.bat
        set VSVARS="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        call %VSVARS%
        cmake . -B build -Thost=x64 -G "Visual Studio 16" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=%ISPC_HOME%\install -DISPC_PREPARE_PACKAGE=ON -DISPC_CROSS=ON -DISPC_GNUWIN32_PATH=%CROSS_TOOLS_GNUWIN32% -DWASM_ENABLED=ON -DISPC_INCLUDE_BENCHMARKS=ON
        cmake --build build --config Release --target package --verbose

    # Sanity checks
    - name: Sanity testing (make check-all, make test) - Linux/macOS
      if: (inputs.platform == 'linux' || inputs.platform == 'macos') && !inputs.enable_lto && !inputs.enable_xe
      run: |
        .github/workflows/scripts/check-ispc.sh

    - name: Sanity testing (make check-all) - Linux/macOS with LTO
      if: (inputs.platform == 'linux' || inputs.platform == 'macos') && inputs.enable_lto && !inputs.enable_xe
      run: |
        cmake --build build --target ispc-stage2-check-all

    - name: Sanity testing (make check-all, make test) - Windows
      if: inputs.platform == 'windows' && !inputs.enable_lto && !inputs.enable_xe
      run: |
        .github/workflows/scripts/check-ispc.ps1

    - name: Sanity testing (make check-all) - Windows with LTO
      if: inputs.platform == 'windows' && inputs.enable_lto && !inputs.enable_xe
      shell: cmd
      run: |
        set VSVARS="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        call %VSVARS%
        cmake --build build --target ispc-stage2-check-all

    - name: Sanity testing with XE - Linux
      if: inputs.platform == 'linux' && inputs.enable_xe
      run: |
        find build -name check_isa -exec {} \;
        find build -name ispc -exec {} --support-matrix \;
        cmake --build build --target ispc-stage2-check

    - name: Sanity testing with XE - Windows
      if: inputs.platform == 'windows' && inputs.enable_xe
      shell: cmd
      env:
        ISPC_DIR: "build\\build-ispc-stage2\\src\\ispc-stage2-build"
      run: |
        set VSVARS="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        call %VSVARS%
        %ISPC_DIR%\bin\check_isa
        %ISPC_DIR%\bin\ispc --support-matrix
        cmake --build build --target ispc-stage2-check

    # Upload artifacts
    - name: Upload package (standard build)
      if: inputs.platform == 'linux' && inputs.architecture == 'aarch64'
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: build/ispc-trunk-linux.tar.gz

    - name: Upload package (Linux)
      if: inputs.platform == 'linux' && inputs.architecture != 'aarch64' && !inputs.enable_xe
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.enable_lto && 'build/build-ispc-stage2/src/ispc-stage2-build/ispc-trunk-linux.tar.gz' || 'build/ispc-trunk-linux.tar.gz' }}

    - name: Upload package (macOS)
      if: inputs.platform == 'macos'
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.enable_lto && 'build/build-ispc-stage2/src/ispc-stage2-build/ispc-trunk-macOS.universal.tar.gz' || 'build/ispc-trunk-macos.tar.gz' }}

    - name: Upload package (Windows)
      if: inputs.platform == 'windows' && !inputs.enable_xe
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.enable_lto && 'build/build-ispc-stage2/src/ispc-stage2-build/ispc-trunk-windows.zip' || 'build/ispc-trunk-windows.zip' }}

    - name: Upload XE enabled package (Linux)
      if: inputs.platform == 'linux' && inputs.enable_xe
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: build/build-ispc-stage2/src/ispc-stage2-build/ispc-trunk-linux.tar.gz

    - name: Upload XE enabled package (Windows)
      if: inputs.platform == 'windows' && inputs.enable_xe
      env:
        ISPC_DIR: "build\\build-ispc-stage2\\src\\ispc-stage2-build"
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ env.ISPC_DIR }}/ispc-trunk-windows.zip

    - name: Upload ISPC with XE dependencies (Linux)
      if: inputs.platform == 'linux' && inputs.enable_xe
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: ispc-xe

    - name: Upload ISPC with XE dependencies (Windows)
      if: inputs.platform == 'windows' && inputs.enable_xe
      uses: actions/upload-artifact@v4.6.0
      with:
        name: ${{ inputs.artifact_name }}
        path: ispc-xe