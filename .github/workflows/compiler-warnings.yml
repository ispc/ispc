name: Compiler Warnings

permissions: read-all

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true

    - name: Install dependencies
      run: |
        .github/workflows/scripts/install-build-deps.sh

    - name: Check environment
      run: |
        cat /proc/cpuinfo
        which -a clang
        clang -v

    - name: Build ISPC with clang in -Werror mode
      run: |
          cmake \
            -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-Werror" \
            -DCMAKE_CXX_FLAGS="-Werror"
          cmake --build build --target all -j4

  gcc-13:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true

    - name: Install dependencies
      run: |
        .github/workflows/scripts/install-build-deps.sh

    - name: Check environment
      run: |
        cat /proc/cpuinfo
        which -a clang
        gcc-13 -v

    - name: Build ISPC with gcc in -Werror mode
      run: |
          cmake \
            -B build \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_FLAGS="-Werror" \
            -DCMAKE_CXX_FLAGS="-Werror"
          cmake --build build --target all -j4

  # windows-2022 ships Visual Studio 2022; windows-2025 ships Visual Studio 2026.
  msvc:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2022, windows-2025]
    runs-on: ${{ matrix.runner }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true

    - name: Install dependencies
      run: |
        .github/workflows/scripts/install-build-deps.ps1

    - name: Check environment
      # wmic is removed from the windows-2025 image; use the PowerShell CIM query.
      shell: pwsh
      run: |
        Get-CimInstance -ClassName Win32_Processor | Select-Object Caption, DeviceID, Name, NumberOfCores, MaxClockSpeed, Status | Format-Table -AutoSize

    - name: Build ISPC with MSVC in -Werror mode
      shell: cmd
      run: |
        cmake ^
          -B build ^
          -DISPC_PREPARE_PACKAGE=ON ^
          -DCMAKE_C_FLAGS="/WX" ^
          -DCMAKE_CXX_FLAGS="/WX" ^
          -DISPC_CROSS=ON ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DISPC_GNUWIN32_PATH=%CROSS_TOOLS_GNUWIN32%
        cmake --build build --target package -j4 --config Release
